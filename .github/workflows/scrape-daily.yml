name: Daily Price Scraper

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r scripts/scrapers/requirements.txt
      - run: playwright install --with-deps chromium
      - name: Run scrapers
        id: scrape
        run: |
          cd scripts/scrapers
          python run_scrapers.py 2>&1 | tee scraper-output.log
          exit ${PIPESTATUS[0]}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
      - name: Sanitize logs
        if: failure()
        run: |
          if [ -f scripts/scrapers/scraper-output.log ]; then
            sed -i \
              -e "s|${SUPABASE_SERVICE_KEY}|REDACTED|g" \
              -e "s|${SUPABASE_URL}|REDACTED|g" \
              -e "s|${FIRECRAWL_API_KEY}|REDACTED|g" \
              scripts/scrapers/scraper-output.log
          fi
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-logs
          path: scripts/scrapers/scraper-output.log

      - name: Notify Discord on failure
        if: failure()
        continue-on-error: true
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL not set — skipping Discord notification"
            exit 0
          fi
          ALERT_TYPE="Workflow failure"
          if grep -q "\[STALE_ALERT\]" scripts/scrapers/scraper-output.log 2>/dev/null; then
            ALERT_TYPE="Stale data alert — multiple scrapers returned zero results"
          fi
          FAILING_LINES=$(grep "\[STALE_ALERT\]" scripts/scrapers/scraper-output.log 2>/dev/null | sed 's/.*\[STALE_ALERT\]  //' | tr '\n' '; ')
          curl -sf -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "❌ Scraper Pipeline Issue",
                "description": "**Alert:** '"$ALERT_TYPE"'\n**Failing:** '"${FAILING_LINES:-Unknown}"'\n**Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\n**Branch:** ${{ github.ref_name }}",
                "color": 15548997
              }]
            }'
